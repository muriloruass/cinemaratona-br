name: Sync Sagas via TMDB

on:
  schedule:
    - cron: '0 6 * * 1'  # Toda segunda-feira às 6h UTC
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync coleções principais via TMDB
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          echo "🎬 Sincronizando sagas via TMDB API..."
          python scripts/sync_saga.py "Marvel Cinematic Universe" mcu
          python scripts/sync_saga.py "James Bond Collection" 007
          python scripts/sync_saga.py "The Dark Knight Collection" batman-nolan
          python scripts/sync_saga.py "Indiana Jones Collection" indiana-jones
          python scripts/sync_saga.py "The Lord of the Rings Collection" lotr
          python scripts/sync_saga.py "Star Wars Collection" star-wars
          python scripts/sync_saga.py "Friday the 13th Collection" sexta-feira-13
          python scripts/sync_saga.py "Mission: Impossible Collection" missao-impossivel
          python scripts/sync_saga.py "John Wick Collection" john-wick
          echo "✅ Sincronização concluída!"

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sagas/
          git diff --staged --quiet || git commit -m "chore: sync sagas via TMDB [skip ci]

          Atualização automática semanal dos IDs via API TMDB.
          Executado em: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
