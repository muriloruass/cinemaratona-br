name: Sync Sagas via TMDB

on:
  schedule:
    - cron: '0 6 * * 1'  # Toda segunda-feira às 6h UTC
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync coleções principais via TMDB
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          echo "🎬 Sincronizando sagas via TMDB API..."
          # Os nomes de saída DEVEM corresponder às chaves em catalogs.py (CATALOGS ou SERIES)
          # para que o override loader em _apply_tmdb_overrides() faça o match corretamente.
          python scripts/sync_saga.py "Marvel Cinematic Universe"          marvel
          python scripts/sync_saga.py "James Bond Collection"              007
          python scripts/sync_saga.py "The Dark Knight Collection"         nolan
          python scripts/sync_saga.py "Indiana Jones Collection"           indianajones
          python scripts/sync_saga.py "The Lord of the Rings Collection"   senhordosaneis
          python scripts/sync_saga.py "Star Wars Collection"               starwars
          python scripts/sync_saga.py "Friday the 13th Collection"         sextafeira13
          python scripts/sync_saga.py "Mission: Impossible Collection"     missaoimpossivel
          python scripts/sync_saga.py "John Wick Collection"               johnwick
          python scripts/sync_saga.py "Jason Bourne Collection"            bourne
          python scripts/sync_saga.py "Fast & Furious Collection"          velozesefuriosos
          python scripts/sync_saga.py "Harry Potter Collection"            harrypotter
          python scripts/sync_saga.py "The Matrix Collection"              matrix
          echo "✅ Sincronização concluída!"

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sagas/
          git diff --staged --quiet || git commit -m "chore: sync sagas via TMDB [skip ci]

          Atualização automática semanal dos IDs via API TMDB.
          Executado em: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
